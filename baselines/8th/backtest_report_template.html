<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JPX 第八名基线回测报告</title>
  <style>
    :root{--ink:#15171d;--muted:#606572;--line:#d9dde5;--soft:#edf0f5;--bg:#f6f7fa;--panel:#fff;--accent:#0b6e4f;--bad:#b0413e;--blue:#2f5f9f;--purple:#6f4ca0;--shadow:0 1px 2px rgba(20,25,35,.06),0 8px 24px rgba(20,25,35,.04)}
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial,"Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg)}
    header{padding:18px 24px;background:var(--panel);border-bottom:1px solid var(--line)} h1{margin:0 0 6px;font-size:21px}.sub,.note{color:var(--muted);font-size:12.5px;line-height:1.5}
    main{max-width:1480px;margin:auto;padding:16px;display:grid;gap:12px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:14px}
    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.controls label{display:grid;gap:4px;color:var(--muted);font-size:12px}.controls select{min-width:180px;padding:7px;border:1px solid var(--line);border-radius:7px;background:white}
    .metrics{display:grid;grid-template-columns:repeat(7,minmax(120px,1fr));gap:8px;margin-top:12px}.metric{border:1px solid var(--soft);border-radius:9px;padding:10px;background:#fbfcfe}.metric span{display:block;color:var(--muted);font-size:11.5px;margin-bottom:5px}.metric strong{font-size:17px}
    .chart{position:relative}.chart svg{width:100%;height:430px;display:block}.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px}.swatch{display:inline-block;width:18px;height:3px;margin-right:6px;vertical-align:middle}
    .grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:8px 7px;border-bottom:1px solid var(--soft);text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}th{color:var(--muted);font-weight:650}.table-wrap{overflow:auto}.good{color:var(--accent)}.bad{color:var(--bad)}
    .warning{border-left:4px solid #d59a25;background:#fff8e8;padding:10px 12px;border-radius:6px;font-size:12.5px;line-height:1.5}.tooltip{position:absolute;display:none;pointer-events:none;background:white;border:1px solid var(--line);border-radius:7px;padding:7px;font-size:12px;box-shadow:var(--shadow)}
    @media(max-width:950px){.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><h1>JPX 第八名基线｜正式 Long–Short 回测</h1><div class="sub" id="meta"></div></header>
<main>
  <div class="warning" id="warning"></div>
  <section class="panel">
    <div class="controls">
      <label>期间<select id="period"></select></label><label>模型<select id="model"></select></label><label>交易成本<select id="cost"></select></label>
    </div>
    <div class="metrics" id="metrics"></div>
  </section>
  <section class="panel chart"><svg id="chart" viewBox="0 0 1200 430" preserveAspectRatio="none"></svg><div class="tooltip" id="tooltip"></div><div class="legend"><span><i class="swatch" style="background:var(--accent)"></i>净值</span><span><i class="swatch" style="background:var(--bad)"></i>回撤</span></div></section>
  <div class="grid">
    <section class="panel"><h3>全场景对比</h3><div class="table-wrap"><table id="comparison"></table></div></section>
    <section class="panel"><h3>口径</h3><div class="note" id="method"></div></section>
  </div>
</main>
<script>
const DATA=__BACKTEST_PAYLOAD__;
const period=document.querySelector('#period'),model=document.querySelector('#model'),cost=document.querySelector('#cost');
const uniq=(xs)=>[...new Set(xs)]; const pct=(x,d=1)=>Number.isFinite(x)?(x*100).toFixed(d)+'%':'n/a'; const num=(x,d=2)=>Number.isFinite(x)?x.toFixed(d):'n/a';
for(const v of uniq(DATA.summary.map(x=>x.period)))period.add(new Option(v,v));for(const v of uniq(DATA.summary.map(x=>x.model)))model.add(new Option(v,v));for(const v of uniq(DATA.summary.map(x=>x.cost_bps)))cost.add(new Option(v+' bps',v));
if([...period.options].some(x=>x.value==='Supplemental (OOS proxy)'))period.value='Supplemental (OOS proxy)';
document.querySelector('#meta').textContent=DATA.meta.portfolio;document.querySelector('#warning').textContent=DATA.meta.warning;document.querySelector('#method').innerHTML=`${DATA.meta.portfolio}<br><br>${DATA.meta.cost}<br><br>年化按 252 个交易日；Sharpe 无风险利率取 0。训练期结果仅描述拟合，不用于证明 alpha。`;
function selectedSummary(){return DATA.summary.find(x=>x.period===period.value&&x.model===model.value&&String(x.cost_bps)===cost.value)}
function renderMetrics(){const s=selectedSummary();const fields=[['总收益',pct(s.total_return)],['年化收益',pct(s.annualized_return)],['年化波动',pct(s.annualized_volatility)],['Sharpe',num(s.sharpe)],['最大回撤',pct(s.max_drawdown)],['日均换手',pct(s.average_daily_turnover)],['年化成本拖累',pct(s.annualized_cost_drag)]];document.querySelector('#metrics').innerHTML=fields.map(([k,v])=>`<div class="metric"><span>${k}</span><strong>${v}</strong></div>`).join('')}
function renderChart(){const rows=DATA.daily.filter(x=>x.Period===period.value&&x.Model===model.value&&String(x.CostBps)===cost.value);const svg=document.querySelector('#chart'),W=1200,H=430,p={l:55,r:18,t:18,b:35},iw=W-p.l-p.r,ih=H-p.t-p.b;const vals=rows.flatMap(x=>[x.Equity,1+x.Drawdown]);const lo=Math.min(...vals),hi=Math.max(...vals),span=hi-lo||1,x=i=>p.l+i/(rows.length-1)*iw,y=v=>p.t+(hi-v)/span*ih,path=key=>rows.map((r,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(key==='Drawdown'?1+r[key]:r[key]).toFixed(1)).join(' ');let out='';for(let i=0;i<5;i++){const v=lo+(hi-lo)*(4-i)/4,yy=p.t+i*ih/4;out+=`<line x1="${p.l}" x2="${W-p.r}" y1="${yy}" y2="${yy}" stroke="#edf0f5"/><text x="${p.l-8}" y="${yy+4}" text-anchor="end" font-size="11" fill="#606572">${v.toFixed(2)}</text>`}out+=`<path d="${path('Equity')}" fill="none" stroke="#0b6e4f" stroke-width="2.2"/><path d="${path('Drawdown')}" fill="none" stroke="#b0413e" stroke-width="1.5"/>`;out+=`<text x="${p.l}" y="${H-8}" font-size="11" fill="#606572">${rows[0].Date}</text><text x="${W-p.r}" y="${H-8}" text-anchor="end" font-size="11" fill="#606572">${rows.at(-1).Date}</text>`;svg.innerHTML=out;svg.onmousemove=e=>{const rect=svg.getBoundingClientRect(),idx=Math.max(0,Math.min(rows.length-1,Math.round(((e.clientX-rect.left)/rect.width*W-p.l)/iw*(rows.length-1)))),r=rows[idx],tip=document.querySelector('#tooltip');tip.style.display='block';tip.style.left=Math.min(e.offsetX+12,rect.width-190)+'px';tip.style.top=Math.max(5,e.offsetY-70)+'px';tip.innerHTML=`<b>${r.Date}</b><br>净值 ${r.Equity.toFixed(4)}<br>回撤 ${pct(r.Drawdown)}<br>Half-turnover ${pct(r.HalfTurnover)}<br>成交额 ${pct(r.TradedNotional)}`};svg.onmouseleave=()=>document.querySelector('#tooltip').style.display='none'}
function renderTable(){const rows=[...DATA.summary].sort((a,b)=>a.period.localeCompare(b.period)||a.model.localeCompare(b.model)||a.cost_bps-b.cost_bps);document.querySelector('#comparison').innerHTML='<thead><tr><th>期间</th><th>模型</th><th>成本</th><th>年化收益</th><th>年化波动</th><th>Sharpe</th><th>最大回撤</th><th>换手</th><th>总收益</th></tr></thead><tbody>'+rows.map(s=>`<tr><td>${s.period}</td><td>${s.model}</td><td>${s.cost_bps} bps</td><td class="${s.annualized_return>=0?'good':'bad'}">${pct(s.annualized_return)}</td><td>${pct(s.annualized_volatility)}</td><td class="${s.sharpe>=0?'good':'bad'}">${num(s.sharpe)}</td><td>${pct(s.max_drawdown)}</td><td>${pct(s.average_daily_turnover)}</td><td>${pct(s.total_return)}</td></tr>`).join('')+'</tbody>'}
function render(){renderMetrics();renderChart()} period.onchange=render;model.onchange=render;cost.onchange=render;renderTable();render();
</script></body></html>
