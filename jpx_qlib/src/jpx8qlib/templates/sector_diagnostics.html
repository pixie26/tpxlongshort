<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JPX Static Sector Diagnostics</title>
  <style>
    :root{color-scheme:dark;background:#09101e;color:#e8eefb;font:14px/1.45 system-ui,sans-serif}
    body{max-width:1500px;margin:auto;padding:28px}.muted{color:#9aa8c2}
    table{width:100%;border-collapse:collapse;background:#111a2d;border:1px solid #263452}
    th,td{padding:8px 9px;border-bottom:1px solid #263452;text-align:right;white-space:nowrap}
    th:first-child,td:first-child{text-align:left}.section{margin-top:28px;overflow:auto}
  </style>
</head>
<body>
  <h1>JPX Static Sector Diagnostics</h1>
  <p class="muted" id="warning"></p>
  <div class="section"><h2>Summary</h2><table id="summary"></table></div>
  <div class="section"><h2>Parity</h2><table id="parity"></table></div>
<script>
const DATA=__SECTOR_PAYLOAD__, n=x=>Number(x).toFixed(3);
document.getElementById("warning").textContent=DATA.point_in_time_warning;
function draw(id,rows,cols){document.getElementById(id).innerHTML="<thead><tr>"+
 cols.map(c=>`<th>${c[1]}</th>`).join("")+"</tr></thead><tbody>"+
 rows.map(r=>"<tr>"+cols.map(c=>`<td>${c[2]?c[2](r[c[0]]):r[c[0]]}</td>`).join("")+"</tr>").join("")+"</tbody>"}
draw("summary",DATA.summary,[["Method","Method"],["Portfolio","Portfolio"],
 ["MedianFoldGrossSharpe","Median gross",n],["MedianFoldNetSharpe","Median net",n],
 ["PositiveNetFolds","Positive folds"],["WorstFoldNetSharpe","Worst net",n],
 ["MedianBreakEvenCostBps","Break-even",n],["MedianTradedNotional","Traded",n],
 ["MedianGrossNetSectorExposure","Sector gross",n],
 ["MedianMaxAbsoluteSectorExposure","Max sector",n]]);
draw("parity",DATA.parity,[["Fold","Fold"],["Method","Method"],
 ["PredictionMaxAbsDifference","Prediction diff",x=>Number(x).toExponential(2)],
 ["PredictionWithinTolerance","Prediction parity"],
 ["PortfolioAccountingExact","Portfolio parity"]]);
</script>
</body>
</html>
