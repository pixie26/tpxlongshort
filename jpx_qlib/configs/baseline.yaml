project:
  name: jpx8_published_baseline
  output_dir: outputs/jpx8_published_baseline

data:
  stock_prices_csv: D:/projects/jpx/data/raw/jpx/train_files/stock_prices.csv
  # Use your existing Features.py / Preprocessing.py / Trackers.py / Validation.py folder.
  legacy_code_dir: D:/projects/jpx/JPXTokyoStockExchangePrediction/winner-models/8th
  feature_engine: legacy       # legacy | reimplemented
  cache_file: prepared_panel.pkl.gz

split:
  train_start: '2017-01-04'
  train_end:   '2020-12-31'
  valid_start: '2021-01-04'
  valid_end:   '2021-06-30'
  test_start:  '2021-07-01'
  test_end:    '2021-12-03'

model:
  # Published notebook used LGBMRegressor defaults. Explicit values make runs reproducible.
  params:
    objective: regression
    n_estimators: 100
    learning_rate: 0.1
    num_leaves: 31
    max_depth: -1
    min_child_samples: 20
    subsample: 1.0
    colsample_bytree: 1.0
    reg_alpha: 0.0
    reg_lambda: 0.0
    random_state: 42
    n_jobs: -1
    verbosity: -1

ranking:
  mode: corrected_rank          # corrected_rank | published_exact
  top_n: 200
  weight_first: 2.0
  weight_last: 1.0

evaluation:
  annualization_days: 252
